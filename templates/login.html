{% extends "base.html" %}

{% block title %}Login - ArdenLeaf{% endblock %}

{% block content %}
<main class="max-w-7xl mx-auto px-6 py-20 flex justify-center items-center min-h-[70vh]">
    <div class="bg-surface-container-lowest border border-[#e8dfa0] rounded-3xl p-10 md:p-12 shadow-xl w-full max-w-md animate-fade-in">
        <div class="text-center mb-10">
            <span class="text-4xl mb-4 block">🍃</span>
            <h1 class="font-headline text-3xl font-black text-primary-container tracking-tighter">Welcome Back</h1>
            <p class="font-body text-on-surface-variant italic mt-2 opacity-70">Sign in to your ArdenLeaf identity.</p>
        </div>

        <form action="{{ url_for('auth.login') }}" method="POST" class="space-y-6">
            <div class="flex flex-col gap-2">
                <label class="font-headline text-xs font-bold uppercase tracking-widest text-[#113819]/60" for="email">Email Address</label>
                <input type="email" id="email" name="email" class="bg-transparent border-b border-[#113819]/10 focus:border-primary-container focus:ring-0 px-0 py-2 font-body text-primary-container transition-all outline-none" placeholder="email@domain.com" required />
            </div>

            <div class="flex flex-col gap-2">
                <label class="font-headline text-xs font-bold uppercase tracking-widest text-[#113819]/60" for="password">Password</label>
                <input type="password" id="password" name="password" class="bg-transparent border-b border-[#113819]/10 focus:border-primary-container focus:ring-0 px-0 py-2 font-body text-primary-container transition-all outline-none" required />
            </div>

            <button type="submit" class="w-full bg-primary-container text-[#f5eebf] py-3.5 rounded-xl font-headline font-bold tracking-tight hover:opacity-95 transform active:scale-[0.98] transition-all shadow-md mt-6">Login to Shelf</button>
        </form>

        <p class="text-center mt-10 font-body text-sm text-on-surface-variant">
            Not yet a member? <a href="{{ url_for('auth.register') }}" class="text-primary-container font-bold underline decoration-primary-container/20 underline-offset-4 hover:decoration-primary-container transition-all">Create an account</a>
        </p>
    </div>
</main>
{% endblock %}
