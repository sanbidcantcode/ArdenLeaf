{% extends 'base.html' %}
{% block title %}Set Your Location — ArdenLeaf{% endblock %}

{% block content %}
<section class="location-page">
    <div class="location-card">
        <div class="location-icon">📍</div>
        <h1>Where are you?</h1>
        <p class="location-sub">
            ArdenLeaf shows you the <strong>nearest</strong> libraries and bookstores first.<br>
            Share your location or enter it manually below.
        </p>

        <!-- GPS Button -->
        <button type="button" id="gps-btn" class="btn btn-primary btn-full btn-icon" onclick="getLocation()">
            <span id="gps-btn-text">📡 Share my current location</span>
        </button>

        <div class="location-divider">
            <span></span><p>or type it in</p><span></span>
        </div>

        <!-- Manual entry form -->
        <form method="POST" action="{{ url_for('auth.save_location') }}" id="location-form">
            <div class="form-group">
                <label for="location-input">City, area, or pin code</label>
                <input type="text" id="location-input" name="location"
                       placeholder="e.g. Connaught Place, New Delhi"
                       autocomplete="address-level2"
                       value="{{ prefilled_location or '' }}">
                <!-- hidden coords populated by JS GPS -->
                <input type="hidden" name="lat" id="location-lat">
                <input type="hidden" name="lng" id="location-lng">
            </div>

            <button type="submit" class="btn btn-primary btn-full" id="save-location-btn">Save location</button>
        </form>

        <!-- Skip -->
        <a href="{{ url_for('index') }}" id="skip-location-btn" class="skip-link">Skip for now →</a>
    </div>
</section>

<script>
function getLocation() {
    const btn = document.getElementById('gps-btn');
    const btnText = document.getElementById('gps-btn-text');

    if (!navigator.geolocation) {
        btnText.textContent = '⚠️ Geolocation not supported by your browser';
        return;
    }

    btnText.textContent = '⏳ Getting your location…';
    btn.disabled = true;

    navigator.geolocation.getCurrentPosition(
        (pos) => {
            document.getElementById('location-lat').value = pos.coords.latitude;
            document.getElementById('location-lng').value = pos.coords.longitude;
            document.getElementById('location-input').value =
                `${pos.coords.latitude.toFixed(4)}, ${pos.coords.longitude.toFixed(4)}`;
            btnText.textContent = '✅ Location captured — click Save below';
            btn.classList.replace('btn-primary', 'btn-outline');
        },
        (err) => {
            btnText.textContent = '❌ Could not get location — enter manually';
            btn.disabled = false;
        }
    );
}
</script>
{% endblock %}
